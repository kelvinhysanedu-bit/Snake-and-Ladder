<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        English Challenge Snake & Ladder
    </title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

<div class="container">

    <!-- HEADER -->

    <header>

        <h1>
            🐍 English Challenge Snake & Ladder 🪜
        </h1>

        <p>
            Vocabulary • Grammar • Speaking
        </p>

    </header>

    <!-- SETUP SCREEN -->

    <section
        id="setupScreen"
        class="card">

        <h2>
            Game Setup
        </h2>

        <div class="setup-group">

            <label>
                Number of Players
            </label>

            <select id="playerCount">

                <option value="2">
                    2 Players
                </option>

                <option value="3">
                    3 Players
                </option>

                <option value="4">
                    4 Players
                </option>

            </select>

        </div>

        <div class="setup-group">

            <label>
                Question Mode
            </label>

            <select id="gameMode">

                <option value="mixed">
                    Mixed Mode
                </option>

                <option value="speaking">
                    Speaking Only
                </option>

                <option value="vocabulary">
                    Vocabulary Only
                </option>

                <option value="grammar">
                    Grammar Only
                </option>

            </select>

        </div>

        <div class="setup-group">

            <label>
                Player Names
            </label>

            <input
                type="text"
                id="player1"
                placeholder="Player 1">

            <input
                type="text"
                id="player2"
                placeholder="Player 2">

            <input
                type="text"
                id="player3"
                placeholder="Player 3">

            <input
                type="text"
                id="player4"
                placeholder="Player 4">

        </div>

        <button id="startBtn">

            Start Game

        </button>

    </section>

    <!-- GAME SCREEN -->

    <section
        id="gameScreen"
        class="hidden">

        <div class="game-layout">

            <!-- LEFT PANEL -->

            <aside class="panel">

                <h2>
                    🏆 Scoreboard
                </h2>

                <div id="scoreboard">

                </div>

                <hr>

                <h2>
                    🥇 Rankings
                </h2>

                <div id="rankingBoard">

                </div>

            </aside>

            <!-- BOARD -->

            <main>

                <div id="board">

                </div>

            </main>

            <!-- RIGHT PANEL -->

            <aside class="panel">

                <h2>
                    Current Turn
                </h2>

                <div id="currentPlayer">

                    -

                </div>

                <div id="diceContainer">

                    <div id="dice">

                        🎲

                    </div>

                </div>

                <button id="rollBtn">

                    Roll Dice

                </button>

                <button id="restartBtn">

                    Restart Game

                </button>

                <div id="gameStatus">

                </div>

            </aside>

        </div>

    </section>

</div>

<!-- QUESTION MODAL -->

<div
    id="questionModal"
    class="modal hidden">

    <div class="modal-content">

        <h2 id="questionCategory">

            English Challenge

        </h2>

        <p id="questionText">

        </p>

        <button id="closeQuestion">

            Continue

        </button>

    </div>

</div>

<!-- WINNER MODAL -->

<div
    id="winnerModal"
    class="modal hidden">

    <div class="modal-content">

        <h2 id="winnerTitle">

            Winner

        </h2>

        <p id="winnerMessage">

        </p>

        <button id="closeWinner">

            Continue

        </button>

    </div>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
