<select id="gameMode">
    <option value="mixed">Mixed Mode</option>
    <option value="speaking">Speaking Only</option>
    <option value="vocabulary">Vocabulary Only</option>
    <option value="grammar">Grammar Only</option>
</select>

</div>

<div class="setup-group">

    <label>Player Names</label>

    <input type="text" id="player1" placeholder="Player 1">
    <input type="text" id="player2" placeholder="Player 2">
    <input type="text" id="player3" placeholder="Player 3">
    <input type="text" id="player4" placeholder="Player 4">

</div>

<button id="startBtn">
    Start Game
</button>

</section>

<!-- MAIN GAME -->

<section id="gameScreen" class="hidden">

    <div class="game-layout">

        <!-- SCOREBOARD -->

        <aside class="panel">

            <h2>🏆 Scoreboard</h2>

            <div id="scoreboard">

            </div>

            <hr>

            <h2>🥇 Rankings</h2>

            <div id="rankingBoard">

            </div>

        </aside>

        <!-- BOARD -->

        <main>

            <div id="board">

            </div>

        </main>

        <!-- CONTROLS -->

        <aside class="panel">

            <h2>Current Turn</h2>

            <div id="currentPlayer">
                -
            </div>

            <div id="diceContainer">

                <div id="dice">
                    🎲
                </div>

            </div>

            <button id="rollBtn">
                Roll Dice
            </button>

            <button id="restartBtn">
                Restart Game
            </button>

            <div id="gameStatus">

            </div>

        </aside>

    </div>

</section>

<!-- QUESTION POPUP -->

<div id="questionModal" class="modal hidden">

    <div class="modal-content">

        <h2 id="questionCategory">
            English Challenge
        </h2>

        <p id="questionText">

        </p>

        <button id="closeQuestion">
            Continue
        </button>

    </div>

</div>

<!-- WINNER POPUP -->

<div id="winnerModal" class="modal hidden">

    <div class="modal-content">

        <h2 id="winnerTitle">
            Winner
        </h2>

        <p id="winnerMessage">

        </p>

        <button id="closeWinner">
            Continue
        </button>

    </div>

</div>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
